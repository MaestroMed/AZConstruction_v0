<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="55%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#02060e"/>
    </linearGradient>
    <linearGradient id="steel-grad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="30%" stop-color="#cbd5e1"/>
      <stop offset="55%" stop-color="#94a3b8"/>
      <stop offset="80%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sheen-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg-grad)"/>
  <rect width="512" height="512" rx="96" fill="url(#sheen-grad)"/>
  <rect x="10" y="10" width="492" height="492" rx="88" fill="none" stroke="#00d4ff" stroke-width="1.6" opacity="0.28"/>
  <g filter="url(#shadow)">
    <text x="256" y="352"
      font-family="'Arial Black', 'Helvetica Neue', 'Segoe UI Black', Impact, sans-serif"
      font-weight="900"
      font-size="296"
      text-anchor="middle"
      fill="url(#steel-grad)"
      letter-spacing="-12">AZ</text>
  </g>
  <rect x="104" y="416" width="304" height="5" rx="2.5" fill="url(#glow-grad)"/>
</svg>
